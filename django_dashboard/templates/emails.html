<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email Dashboard</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    color: #333;
}

/* Header */
.header {
    text-align: center;
    color: white;
    padding: 30px 20px;
}

.header h1 {
    font-size: 32px;
    font-weight: bold;
}

.header p {
    opacity: 0.8;
    margin-top: 5px;
}

/* Glass container */
.container {
    width: 95%;
    max-width: 1200px;
    margin: auto;
    backdrop-filter: blur(12px);
}

/* Glass card */
.card {
    background: rgba(255, 255, 255, 0.15);
    border-radius: 15px;
    padding: 20px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

/* Form */
form {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    min-width: 160px;
}

/* Button */
button {
    background: linear-gradient(135deg, #ff7eb3, #ff758c);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* Table */
.table-box {
    overflow-x: auto;
}

table {
    width: 100%;
    border-collapse: collapse;
    color: white;
}

th {
    text-align: left;
    padding: 12px;
    font-size: 14px;
    border-bottom: 1px solid rgba(255,255,255,0.2);
}

td {
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

/* Row hover animation */
tr {
    transition: 0.3s;
}

tr:hover {
    background: rgba(255,255,255,0.1);
    transform: scale(1.01);
}

/* Badges */
.badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
}

/* Status */
.unread {
    background: #ffcc00;
    color: black;
}

.read {
    background: #00e676;
    color: black;
}

/* Category */
.spam {
    background: #ff5252;
    color: white;
}

.authentic {
    background: #40c4ff;
    color: black;
}

/* Scrollbar */
::-webkit-scrollbar {
    height: 6px;
}
::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.4);
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
    <h1>📧 Asif's Mail Scraping Dashboard</h1>
    <p>Visualize Authentic & Spam Emails (Read / Unread)</p>
</div>

<div class="container">

<!-- Search Card -->
<div class="card">
<form>
    <input name="q" placeholder="🔍 Search emails...">

    <select name="status">
        <option value="">Status</option>
        <option value="Unread">Unread</option>
        <option value="Read">Read</option>
    </select>

    <select name="category">
        <option value="">Category</option>
        <option value="Spam">Spam</option>
        <option value="Authentic">Authentic</option>
    </select>

    <button>Search</button>
</form>
</div>

<!-- Table Card -->
<div class="card table-box">
<table>

<tr>
<th>Sender</th>
<th>Subject</th>
<th>Status</th>
<th>Category</th>
<th>Time</th>
</tr>

{% for e in emails %}
<tr>
<td>{{e.sender}}</td>
<td>{{e.subject}}</td>

<td>
<span class="badge {% if e.status == 'Unread' %}unread{% else %}read{% endif %}">
{{e.status}}
</span>
</td>

<td>
<span class="badge {% if e.category == 'Spam' %}spam{% else %}authentic{% endif %}">
{{e.category}}
</span>
</td>

<td>{{e.timestamp}}</td>
</tr>
{% endfor %}

</table>
</div>

</div>

</body>
</html>
