<!DOCTYPE html>
<html>
<head>
<title>Email Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f8fc;
}

h2 {
    text-align: center;
    background: linear-gradient(90deg,#1584c4,#06b6d4);
    color: white;
    padding: 20px;
}

form {
    text-align: center;
    margin: 20px;
}

input, select {
    padding: 8px;
    margin: 5px;
}

button {
    padding: 8px 15px;
    background: #1584c4;
    color: white;
    border: none;
}

table {
    width: 95%;
    margin: auto;
    border-collapse: collapse;
    background: white;
}

th {
    background: #02689d;
    color: white;
    padding: 10px;
}

td {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    vertical-align: top;
}

tr:nth-child(even) {
    background: #f2f2f2;
}

.spam {
    color: red;
    font-weight: bold;
}

.auth {
    color: green;
    font-weight: bold;
}
</style>

<script>
setTimeout(()=>location.reload(),10000);
</script>

</head>

<body>

<h2>Email Dashboard</h2>

<form method="GET">
    <input name="q" placeholder="Search..." value="{{request.GET.q}}">

    <select name="status">
        <option value="">Status</option>
        <option value="Unread">Unread</option>
        <option value="Read">Read</option>
    </select>

    <select name="category">
        <option value="">Category</option>
        <option value="Spam">Spam</option>
        <option value="Authentic">Authentic</option>
    </select>

    <button type="submit">Search</button>
</form>

<table>
<tr>
<th>Sender</th>
<th>Subject</th>
<th>Body</th> <!-- FULL BODY -->
<th>Status</th>
<th>Category</th>
<th>Time</th>
</tr>

{% for e in emails %}
<tr>
<td>{{e.sender}}</td>
<td>{{e.subject}}</td>

<!-- ✅ FULL BODY SHOW -->
<td style="max-width:400px; overflow:auto; white-space:pre-wrap;">
{{e.body}}
</td>

<td>{{e.status}}</td>

<td class="{% if e.category == 'Spam' %}spam{% else %}auth{% endif %}">
{{e.category}}
</td>

<td>{{e.timestamp}}</td>
</tr>
{% endfor %}
</table>

</body>
</html>
